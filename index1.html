<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Store</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}


header {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: white;
    align-items: center;
}

.logo {
    font-weight: bold;
    color: orange;
}

nav a {
    margin: 0 10px;
    text-decoration: none;
    color: black;
}

.signup {
    background: orange;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
}


.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 60px;
    background:linear-gradient (to right, white, #ffe0b2);
}

.hero-text {
    max-width: 400px;
}

.hero-text h1 {
    color: red;
    font-size: 40px;
}

.hero-text p {
    color: gray;
}

.hero-text button {
    background:aqua;
    border: none;
    padding: 10px 20px;
    border-radius: 20px;
    color: white;
    margin-top: 10px;
}

.hero img {
    width: 350px;
    border-radius: 20px;
}



.products {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    width: 150px;
    text-align: center;
    box-shadow: 20px 10px rgba(0,0,0,0.1);
}


.footer {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: orange;
    padding: 15px;
    display: flex;
    justify-content:space-around;
    color: white;
}
</style>

</head>

<body>


<header>
    <div class="logo">🛒 YourLogo</div>
    <nav>
        <a    href ="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">FAQ</a>
    </nav>
    <button class="signup">Sign Up</button>
</header>


<section class="hero">
    <div class="hero-text">
        <h1>Nagendra stroes</h1>
        <h3>Order online</h3>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
        <button>Shop Now</button>
    </div>

    <img src="https://images.unsplash.com/photo-1542838132-92c53300491e" alt="grocery">
</section>


<div class="products">
    <div class="card">Vegetables</div>
    <div class="card">Fruits</div>
    <div class="card">Snacks</div>
</div>

<div class="footer">
    <div>Discount</div>
    <div>Total: ₹ 0</div>
</div>

</body>
</html>
